apiVersion: v1
kind: ConfigMap
metadata:
  name: edumatch-api-local-config
  namespace: edumatch
data:
  PORT: '3000'
  NODE_ENV: development
  DB_HOST: host.docker.internal
  DB_PORT: '5435'
  DB_NAME: edumatch
  DB_USER: postgres
  REDIS_HOST: host.docker.internal
  REDIS_PORT: '6380'
  S3_ENDPOINT: http://host.docker.internal:9100
  S3_BUCKET: edumatch
  S3_ACCESS_KEY: minioadmin
  MAIL_FROM: noreply@edumatch.vn
  JWT_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  GOOGLE_CLIENT_ID: ''
  GOOGLE_CLIENT_SECRET: ''
  FACEBOOK_APP_ID: ''
  FACEBOOK_APP_SECRET: ''
  SENDGRID_API_KEY: ''
---
apiVersion: v1
kind: Secret
metadata:
  name: edumatch-api-local-secret
  namespace: edumatch
type: Opaque
stringData:
  DB_PASSWORD: postgres
  JWT_SECRET: local_jwt_secret_change_me
  JWT_REFRESH_SECRET: local_jwt_refresh_secret_change_me
  EMAIL_VERIFY_SECRET: local_email_verify_secret_change_me
  RESET_PASSWORD_SECRET: local_reset_password_secret_change_me
  S3_SECRET_KEY: minioadmin
---
apiVersion: v1
kind: Service
metadata:
  name: edumatch-api
  namespace: edumatch
spec:
  type: NodePort
  selector:
    app: edumatch-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edumatch-api
  namespace: edumatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edumatch-api
  template:
    metadata:
      labels:
        app: edumatch-api
    spec:
      hostAliases:
        - ip: 172.18.0.1
          hostnames:
            - host.docker.internal
      containers:
        - name: api
          image: node:20-bookworm-slim
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/backend
          command:
            - sh
            - -c
            - npm run migration:run && npm run build && npm run start:prod
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: edumatch-api-local-config
            - secretRef:
                name: edumatch-api-local-secret
          volumeMounts:
            - name: backend-source
              mountPath: /workspace/backend
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: backend-source
          hostPath:
            path: /workspace/backend
            type: Directory
