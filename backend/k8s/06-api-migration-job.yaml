apiVersion: batch/v1
kind: Job
metadata:
  name: edumatch-api-migration
  namespace: edumatch
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done
      containers:
        - name: migration
          image: edumatch-backend:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: edumatch-api-config
            - secretRef:
                name: edumatch-api-secret
          command:
            - npm
            - run
            - migration:run
