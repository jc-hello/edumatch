apiVersion: v1
kind: ConfigMap
metadata:
  name: edumatch-api-config
  namespace: edumatch
data:
  PORT: '3000'
  NODE_ENV: development
  DB_HOST: postgres
  DB_PORT: '5432'
  DB_NAME: edumatch
  DB_USER: postgres
  REDIS_HOST: redis
  REDIS_PORT: '6379'
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: edumatch
  S3_ACCESS_KEY: minioadmin
  MAIL_FROM: noreply@edumatch.vn
  JWT_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  GOOGLE_CLIENT_ID: ''
  GOOGLE_CLIENT_SECRET: ''
  FACEBOOK_APP_ID: ''
  FACEBOOK_APP_SECRET: ''
  SENDGRID_API_KEY: ''
---
apiVersion: v1
kind: Secret
metadata:
  name: edumatch-api-secret
  namespace: edumatch
type: Opaque
stringData:
  DB_PASSWORD: postgres
  JWT_SECRET: local_jwt_secret_change_me
  JWT_REFRESH_SECRET: local_jwt_refresh_secret_change_me
  EMAIL_VERIFY_SECRET: local_email_verify_secret_change_me
  RESET_PASSWORD_SECRET: local_reset_password_secret_change_me
  S3_SECRET_KEY: minioadmin
