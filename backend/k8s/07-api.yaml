apiVersion: v1
kind: Service
metadata:
  name: edumatch-api
  namespace: edumatch
spec:
  type: NodePort
  selector:
    app: edumatch-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edumatch-api
  namespace: edumatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edumatch-api
  template:
    metadata:
      labels:
        app: edumatch-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z redis 6379; do sleep 2; done
      containers:
        - name: api
          image: edumatch-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: edumatch-api-config
            - secretRef:
                name: edumatch-api-secret
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
